<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Reinforcement learning trading project cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0a1f"/>
      <stop offset="1" stop-color="#151030"/>
    </linearGradient>
    <linearGradient id="policy" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#915eff"/>
      <stop offset="1" stop-color="#00cea8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <g stroke="#211e35" stroke-width="1">
    <line x1="80" y1="80" x2="720" y2="80"/>
