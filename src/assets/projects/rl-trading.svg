    <rect x="128" y="210" width="24" height="60" rx="3" fill="#e05d5d"/>
    <line x1="220" y1="160" x2="220" y2="290" stroke="#4b4668"/>
    <rect x="208" y="185" width="24" height="75" rx="3" fill="#39d353"/>
    <line x1="300" y1="140" x2="300" y2="250" stroke="#4b4668"/>
    <rect x="288" y="165" width="24" height="55" rx="3" fill="#e05d5d"/>
    <line x1="380" y1="120" x2="380" y2="245" stroke="#4b4668"/>
    <rect x="368" y="140" width="24" height="80" rx="3" fill="#39d353"/>
    <line x1="460" y1="110" x2="460" y2="215" stroke="#4b4668"/>
    <rect x="448" y="130" width="24" height="60" rx="3" fill="#39d353"/>
    <line x1="540" y1="95" x2="540" y2="195" stroke="#4b4668"/>
    <rect x="528" y="115" width="24" height="55" rx="3" fill="#e05d5d"/>
    <line x1="620" y1="85" x2="620" y2="175" stroke="#4b4668"/>
    <rect x="608" y="100" width="24" height="55" rx="3" fill="#39d353"/>
  </g>
  <!-- learned policy curve -->
  <path d="M110 310 C 220 300, 300 240, 400 200 S 600 120, 700 95" fill="none" stroke="url(#policy)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="700" cy="95" r="8" fill="#00cea8"/>
  <text x="660" y="70" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#8fe6d4">reward ↑</text>
  <rect x="56" y="24" rx="14" width="280" height="28" fill="none" stroke="#00cea8" stroke-width="1.5"/>
  <text x="196" y="43" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#8fe6d4">PPO · REINFORCEMENT LEARNING</text>
  <text x="56" y="392" font-family="'Segoe UI', Arial, sans-serif" font-size="44" font-weight="700" fill="#ffffff">RL Trading Agent</text>
  <text x="56" y="422" font-family="'Segoe UI', Arial, sans-serif" font-size="17" fill="#aaa6c3">Policy-gradient stock trading with PPO</text>
</svg>
