<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="NewsHub Android app project cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0a1f"/>
      <stop offset="1" stop-color="#151030"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- phone -->
  <g>
    <rect x="140" y="46" width="180" height="290" rx="24" fill="#1d1836" stroke="#37325a" stroke-width="3"/>
    <rect x="196" y="58" width="68" height="8" rx="4" fill="#37325a"/>
    <!-- app header -->
    <rect x="156" y="80" width="148" height="26" rx="8" fill="#915eff" opacity="0.85"/>
    <!-- news cards -->
    <g>
      <rect x="156" y="118" width="148" height="56" rx="8" fill="#211e35"/>
      <rect x="164" y="126" width="40" height="40" rx="6" fill="#37325a"/>
      <line x1="214" y1="134" x2="296" y2="134" stroke="#4b4668" stroke-width="5" stroke-linecap="round"/>
      <line x1="214" y1="150" x2="280" y2="150" stroke="#4b4668" stroke-width="5" stroke-linecap="round"/>
      <line x1="214" y1="164" x2="262" y2="164" stroke="#00cea8" stroke-width="5" stroke-linecap="round"/>
      <rect x="156" y="184" width="148" height="56" rx="8" fill="#211e35"/>
      <rect x="164" y="192" width="40" height="40" rx="6" fill="#37325a"/>
      <line x1="214" y1="200" x2="296" y2="200" stroke="#4b4668" stroke-width="5" stroke-linecap="round"/>
      <line x1="214" y1="216" x2="286" y2="216" stroke="#4b4668" stroke-width="5" stroke-linecap="round"/>
      <line x1="214" y1="230" x2="256" y2="230" stroke="#00cea8" stroke-width="5" stroke-linecap="round"/>
      <rect x="156" y="250" width="148" height="56" rx="8" fill="#211e35"/>
      <rect x="164" y="258" width="40" height="40" rx="6" fill="#37325a"/>
      <line x1="214" y1="266" x2="296" y2="266" stroke="#4b4668" stroke-width="5" stroke-linecap="round"/>
      <line x1="214" y1="282" x2="274" y2="282" stroke="#4b4668" stroke-width="5" stroke-linecap="round"/>
      <line x1="214" y1="296" x2="266" y2="296" stroke="#00cea8" stroke-width="5" stroke-linecap="round"/>
    </g>
    <!-- nav bar -->
    <rect x="156" y="314" width="148" height="12" rx="6" fill="#211e35"/>
  </g>
  <!-- bookmark badge -->
  <path d="M370 100 h44 v64 l-22 -16 -22 16 z" fill="#915eff"/>
  <!-- globe / categories -->
  <g stroke="#37325a" stroke-width="2.5" fill="none">
    <circle cx="530" cy="170" r="60"/>
    <ellipse cx="530" cy="170" rx="26" ry="60"/>
    <line x1="470" y1="170" x2="590" y2="170"/>
    <path d="M478 140 a70 40 0 0 1 104 0"/>
    <path d="M478 200 a70 40 0 0 0 104 0"/>
  </g>
  <g fill="#00cea8">
    <circle cx="590" cy="130" r="6"/>
    <circle cx="475" cy="205" r="6"/>
  </g>
  <rect x="620" y="120" rx="12" width="120" height="24" fill="none" stroke="#00cea8" stroke-width="1.5"/>
  <text x="680" y="137" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#8fe6d4">multilingual</text>
  <rect x="620" y="156" rx="12" width="120" height="24" fill="none" stroke="#915eff" stroke-width="1.5"/>
  <text x="680" y="173" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#b9a8f5">bookmarks</text>
  <rect x="620" y="192" rx="12" width="120" height="24" fill="none" stroke="#6c63a8" stroke-width="1.5"/>
  <text x="680" y="209" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#aaa6c3">categories</text>
  <rect x="56" y="24" rx="14" width="210" height="28" fill="none" stroke="#00cea8" stroke-width="1.5"/>
  <text x="161" y="43" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#8fe6d4">ANDROID · NEWS-API</text>
  <text x="56" y="392" font-family="'Segoe UI', Arial, sans-serif" font-size="44" font-weight="700" fill="#ffffff">NewsHub</text>
  <text x="56" y="422" font-family="'Segoe UI', Arial, sans-serif" font-size="17" fill="#aaa6c3">Android news reader with search, bookmarks &amp; SQLite</text>
</svg>
