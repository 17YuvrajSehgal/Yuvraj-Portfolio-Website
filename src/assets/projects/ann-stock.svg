<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Neural network stock prediction project cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0a1f"/>
      <stop offset="1" stop-color="#151030"/>
    </linearGradient>
    <linearGradient id="pred" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#915eff"/>
      <stop offset="1" stop-color="#00cea8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- network edges -->
  <g stroke="#37325a" stroke-width="1.5">
    <line x1="120" y1="110" x2="270" y2="80"/><line x1="120" y1="110" x2="270" y2="160"/><line x1="120" y1="110" x2="270" y2="240"/>
    <line x1="120" y1="190" x2="270" y2="80"/><line x1="120" y1="190" x2="270" y2="160"/><line x1="120" y1="190" x2="270" y2="240"/>
    <line x1="120" y1="270" x2="270" y2="80"/><line x1="120" y1="270" x2="270" y2="160"/><line x1="120" y1="270" x2="270" y2="240"/>
    <line x1="270" y1="80" x2="420" y2="120"/><line x1="270" y1="80" x2="420" y2="220"/>
    <line x1="270" y1="160" x2="420" y2="120"/><line x1="270" y1="160" x2="420" y2="220"/>
    <line x1="270" y1="240" x2="420" y2="120"/><line x1="270" y1="240" x2="420" y2="220"/>
    <line x1="420" y1="120" x2="540" y2="170"/><line x1="420" y1="220" x2="540" y2="170"/>
  </g>
  <!-- network nodes -->
  <g>
    <circle cx="120" cy="110" r="13" fill="#211e35" stroke="#6c63a8" stroke-width="2"/>
    <circle cx="120" cy="190" r="13" fill="#211e35" stroke="#6c63a8" stroke-width="2"/>
    <circle cx="120" cy="270" r="13" fill="#211e35" stroke="#6c63a8" stroke-width="2"/>
    <circle cx="270" cy="80" r="13" fill="#211e35" stroke="#915eff" stroke-width="2"/>
    <circle cx="270" cy="160" r="13" fill="#211e35" stroke="#915eff" stroke-width="2"/>
    <circle cx="270" cy="240" r="13" fill="#211e35" stroke="#915eff" stroke-width="2"/>
    <circle cx="420" cy="120" r="13" fill="#211e35" stroke="#915eff" stroke-width="2"/>
    <circle cx="420" cy="220" r="13" fill="#211e35" stroke="#915eff" stroke-width="2"/>
    <circle cx="540" cy="170" r="15" fill="#915eff"/>
  </g>
  <!-- predicted price curve -->
  <path d="M560 170 C 610 168, 630 140, 660 120 S 720 85, 745 75" fill="none" stroke="url(#pred)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="745" cy="75" r="7" fill="#00cea8"/>
  <g stroke="#211e35" stroke-width="1">
    <line x1="560" y1="70" x2="560" y2="230"/>
    <line x1="560" y1="230" x2="760" y2="230"/>
  </g>
  <rect x="56" y="24" rx="14" width="290" height="28" fill="none" stroke="#915eff" stroke-width="1.5"/>
  <text x="201" y="43" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#b9a8f5">TENSORFLOW · DEEP LEARNING</text>
  <text x="56" y="392" font-family="'Segoe UI', Arial, sans-serif" font-size="44" font-weight="700" fill="#ffffff">Stock Prediction ANN</text>
  <text x="56" y="422" font-family="'Segoe UI', Arial, sans-serif" font-size="17" fill="#aaa6c3">Neural-network forecasting for financial time series</text>
</svg>
